services:
  mosquitto:
    image: eclipse-mosquitto:2.1.2
    platform: linux/arm64
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/passwd:/mosquitto/config/passwd
      - ./mosquitto/acl:/mosquitto/config/acl
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:2.26.1-pg17
    platform: linux/arm64
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - ../config/hub.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${SSD_MOUNT:-./data/timescaledb}:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farm -d farmdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  bridge:
    build: ./bridge
    depends_on:
      - mosquitto
      - timescaledb
    env_file:
      - ../config/hub.env
    restart: unless-stopped

  api:
    build: ./api
    depends_on:
      - timescaledb
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../config/hub.env
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  caddy:
    image: caddy:latest
    platform: linux/arm64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - api
    restart: unless-stopped

volumes:
  mosquitto_data:
  caddy_data:
  caddy_config:
